version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gesp-ace-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-gespace}?schema=public
      - REDIS_URL=redis://redis:6379
      - JUDGE0_URL=http://judge0:2358
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=2h
      - JWT_REFRESH_EXPIRES_IN=7d
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - LOG_LEVEL=info
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      judge0:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gesp-network

  postgres:
    image: postgres:16-alpine
    container_name: gesp-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gespace}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gesp-network

  redis:
    image: redis:7-alpine
    container_name: gesp-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gesp-network

  judge0:
    image: judge0ce/judge0:latest
    container_name: gesp-judge0
    ports:
      - "2358:2358"
    environment:
      - JUDGE0_HTTP_PORT=2358
    ulimits:
      nproc: 100
      nofile: 20000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2358/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - gesp-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gesp-network:
    driver: bridge
